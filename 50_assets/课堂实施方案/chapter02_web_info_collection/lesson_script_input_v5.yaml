schema_version: v5.0
generator_target: chapter_lesson_script
course: Web应用安全与防护
chapter_id: chapter02_web_info_collection
chapter_title: 第二章 Web信息收集与请求分析
duration_minutes: 90
owner: Shen
updated: '2026-04-20'
chapter_type: 观察章
core_spine: 从公开线索走到请求证据，再走到授权主动探测。
chapter_goals:
- 学生能区分公开线索、第三方索引线索、真实请求证据与主动探测结果。
- 学生能在授权边界内说明 Google / Whois / Shodan / Burp / Nmap 分别回答什么问题。
- 学生能说清“能说明什么 / 不能替代什么 / 下一步为什么是这个”。
prerequisites:
- 已完成第一章最小系统链路理解。
- 能识别页面输入点、URL 参数、Cookie 与页面响应差异。
boundary_rules:
- 仅限 DVWA、本机浏览器、localhost、127.0.0.1 或教师明确授权环境。
- 不使用任何公网真实目标作为演示对象。
- 所有截图与说明都必须可追溯、可脱敏。
class_baseline: 已完成第一章，能识别 URL、请求、响应、Cookie 的最小对象。
environment: DVWA、本机浏览器、教师授权实验环境
authorized_scope:
- DVWA
- 本机浏览器
- localhost
- 127.0.0.1
- 教师授权环境
sensitive_fields_to_mask:
- Cookie
- SessionID
- Token
- 账号
- 主机信息
pace_blocks:
- time: 0-10
  name: 开场与边界
  goal: 建立“本章不是工具堆叠课”
  teacher_action: 明确六层信息主线与授权边界。
  student_action: 判断哪些对象属于线索/证据/主动探测。
  evidence: 边界说明
- time: 10-30
  name: Concept
  goal: 建立信息层级分类
  teacher_action: 展示 Google / Whois / Shodan / Burp / Nmap 五类结果样例。
  student_action: 按层级做第一轮归类。
  evidence: 六层分类表
- time: 30-55
  name: Mechanism
  goal: 讲清不同工具回答不同问题
  teacher_action: 用“能说明什么 / 不能替代什么”逐类收束。
  student_action: 说明某一类结果为何不能直接推出漏洞。
  evidence: 关系链骨架
- time: 55-80
  name: Application
  goal: 从页面走到请求证据与主动探测
  teacher_action: 演示 DVWA 页面 -> Burp 请求 -> Nmap 授权扫描的顺序。
  student_action: 标注 Method / URL / 参数 / Cookie / 状态码。
  evidence: 任务5、任务6最小字段
- time: 80-90
  name: 形成性评估与收口
  goal: 固化关系图和作业要求
  teacher_action: 现场收束关系图列项与 AI 审核要求。
  student_action: 完成最小关系表和 1 个强制判断题。
  evidence: 关系图草稿 + Exit Ticket
omdm_map:
  observation:
    action: 展示五类结果样例与一组 DVWA 页面动作。
    question: 这些结果看起来分别像什么信息？
    evidence: 学生初步分类。
  decision:
    action: 强制判断“线索 / 证据 / 主动探测”。
    question: Shodan 和 Burp 能不能算同一层信息？
    evidence: 口头选择与理由。
  evidence:
    action: 标出 Burp 请求关键字段与 Nmap 返回对象。
    question: 哪个字段支持你的判断？
    evidence: Method、URL、参数、Cookie、状态码。
  mechanism:
    action: 收束“能说明什么 / 不能替代什么 / 下一步为什么是这个”。
    question: 为什么 Burp 比 Google 更接近技术证据？
    evidence: 关系链解释。
  modification:
    action: 讨论如果没有授权、没有直接回显、只有第三方索引时怎么表达。
    question: 如果只有 Shodan 结果，你最多能下什么结论？
    evidence: 条件变化解释。
board_skeleton:
- 公开线索 -> 身份/背景线索 -> 第三方索引线索 -> 请求证据 -> 授权主动探测
- 能说明什么 / 不能替代什么 / 下一步
- 线索 / 证据 / 主动探测
key_questions:
  forced_choice:
  - Shodan 的结果更接近：A 实时主动探测；B 第三方历史索引；C 已证实漏洞。
  - Burp 的教学价值更接近：A 页面截图备份；B 真实交互证据；C 漏洞最终结论。
  evidence_probe:
  - 你为什么认为这是“请求证据”而不是“页面现象”？
  - 哪个字段支撑你说“这里存在参数变化”？
  conditional_change:
  - 如果只有 Google / Whois / Shodan，没有 Burp，你最多能说到哪一步？
  - 如果没有授权，为什么 Nmap 不应作为本章课堂动作？
served_tasks:
- Google 公开页面线索记录
- Whois 域名身份信息记录
- Shodan 服务暴露线索记录
- Burp 请求证据观察
- Nmap 授权主动探测记录
required_relation_graph:
- 至少写出“信息层 / 方法 / 结果类型 / 能说明什么 / 不能替代什么 / 下一步”。
- 只列工具名和结果名不算达标。
ai_review_prompt:
- 不能只写“用了 AI”，要写保留了什么、删改了什么、核实了什么。
- 本章最容易误判的是“把线索写成证据，把证据写成漏洞结论”。
formative_assessment:
  action: 给学生一组混合结果样例，要求判断其属于哪一层信息，写出“能说明什么 / 不能替代什么”，并说明下一步为什么应是这个。
  pass_criteria:
  - 至少正确区分 4 类结果中的 3 类。
  - 至少能对 1 类结果说出“不能替代什么”。
  - 不把线索直接写成漏洞结论。
  common_failures:
  - 把端口开放直接写成漏洞。
  - 把 Shodan 写成自己实时探测结果。
  - Burp 截图很多，但字段没标清。
high_freq_misconceptions:
- issue: 关系链不足
  trigger: 关系图收口
  correction: 强制要求补“不能替代什么”和“下一步”。
  from_memory: true
- issue: 证据不清晰
  trigger: Burp / Nmap 字段说明
  correction: 追问“哪个字段支持你”。
  from_memory: true
- issue: 证据与结论不对应
  trigger: Shodan / Burp / Nmap 结论表达
  correction: 改写为“支持到哪一步就写到哪一步”。
  from_memory: true
- issue: 任务部分完成
  trigger: 只交截图不写机制
  correction: 现场示范最小解释模板。
  from_memory: true
step9_min_observations:
- 学生最容易混淆的两个信息层是什么。
- 哪个字段最常漏标。
- 强制选择题里最常见的错误选项是什么。
after_class_bridge:
  assignment:
  - 按 assignment pack 完成六类任务与收口项。
  - 关系图必须体现“能说明什么 / 不能替代什么 / 下一步”。
  - AI 审核记录为必填。
  next_chapter:
  - 第二章结束后，第三章进入“输入如何影响查询结构”的漏洞机制分析。
  if_unbalanced_adjustment:
  - 如果学生仍在背工具名，下一次应压缩工具介绍、增加分类与判断练习。
  - 如果学生不会写“不能替代什么”，下一次应增加证据边界训练。
