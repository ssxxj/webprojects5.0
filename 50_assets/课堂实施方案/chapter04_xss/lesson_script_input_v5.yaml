schema_version: v5.0
generator_target: chapter_lesson_script
course: Web应用安全与防护
chapter_id: chapter04_xss
chapter_title: 第四章 XSS漏洞与防护
duration_minutes: 90
owner: Shen
updated: '2026-04-20'
chapter_type: 漏洞机制章
core_spine: 从输入进入输出位置走到浏览器解析执行，再走到输出控制与执行限制。
chapter_goals:
- 学生能理解 XSS 的根因是输出上下文失控，而不是“输入了脚本”。
- 学生能区分 Reflected、Stored、DOM 三类路径差异。
- 学生能把 Low / Medium 差异和输出编码、输入校验、CSP 放回同一条风险链。
prerequisites:
- 已完成第一章页面、请求、状态最小理解。
- 已完成第二章线索/证据/主动探测区分。
- 已完成第三章“结构污染”主线，能接受“浏览器解释层”是另一条机制链。
boundary_rules:
- 仅限 DVWA、本机浏览器、localhost、127.0.0.1 或教师明确授权环境。
- 不使用任何公网真实目标进行 XSS 观察或验证。
- 截图、账号、Cookie 等敏感信息必须脱敏、可追溯。
class_baseline: 已完成前三章，能接受“页面现象背后有后端处理”，但尚未稳定理解“浏览器解释执行”这一层。
environment: DVWA、本机浏览器、教师授权实验环境
authorized_scope:
- DVWA
- 本机浏览器
- localhost
- 127.0.0.1
- 教师授权环境
sensitive_fields_to_mask:
- 账号
- Cookie
- SessionID
- 路径
pace_blocks:
- time: 0-10
  name: 开场与边界
  goal: 重申本章不是脚本样例记忆课
  teacher_action: 明确授权边界与本章主线。
  student_action: 判断“输入危险 vs 输出上下文失控”。
  evidence: 边界说明
- time: 10-30
  name: Concept
  goal: 建立浏览器解析与输出上下文最小模型
  teacher_action: 用纯文本显示与危险上下文对比演示。
  student_action: 判断浏览器是在显示还是解释。
  evidence: 任务1 草稿
- time: 30-55
  name: Mechanism
  goal: 讲清 Reflected / Stored / DOM 路径差异
  teacher_action: 对比即时回显、存储后触发、前端 DOM 更新。
  student_action: 说明三类路径哪里不同。
  evidence: 任务2-4 字段
- time: 55-80
  name: Application
  goal: 收束 Low / Medium 与防护链
  teacher_action: 解释过滤、输出编码、CSP 的控制层次。
  student_action: 完成风险链与防护层次标注。
  evidence: 任务5 草稿
- time: 80-90
  name: 形成性评估与收口
  goal: 固化类型差异与风险链图要求
  teacher_action: 现场收束关系图列项与 AI 审核要求。
  student_action: 完成最小关系链表和 1 个强制判断题。
  evidence: 关系图草稿 + Exit Ticket
omdm_map:
  observation:
    action: 展示纯文本位置与危险上下文下的不同表现。
    question: 为什么同样输入在两个位置效果不同？
    evidence: 学生能描述输出位置差异。
  decision:
    action: 强制判断“输入问题 / 输出上下文问题”。
    question: XSS 根因更接近输入里有脚本，还是输出进入了危险上下文？
    evidence: 口头选择与理由。
  evidence:
    action: 标出输入点、输出位置、现象变化和执行线索。
    question: 哪个现象支撑你说浏览器执行了内容，而不是只是显示文本？
    evidence: 输入点、回显位置、执行现象。
  mechanism:
    action: 收束“输入 -> 输出位置 -> 浏览器解析 -> 是否执行”。
    question: 为什么 Reflected、Stored、DOM 不是三套完全不同问题？
    evidence: 风险链解释。
  modification:
    action: 讨论没有存储、没有回显、只有 DOM 更新时的变化。
    question: 如果没有服务器存储，只剩前端 DOM 更新，为什么仍可能形成 XSS？
    evidence: 条件变化解释。
board_skeleton:
- 输入 -> 输出位置 -> 浏览器解析 -> 是否执行 -> 风险范围
- 上下文失控
- Reflected / Stored / DOM
- 输出编码 -> 输出层；输入校验 -> 输入层；CSP / 执行限制 -> 执行层
key_questions:
  forced_choice:
  - XSS 的根因更接近：A 输入中有脚本；B 不可信内容进入了浏览器会解释执行的上下文。
  - Stored XSS 与 Reflected XSS 的关键差异更接近：A payload 长度不同；B 路径结构不同。
  - CSP 更接近控制：A 输入层；B 输出层；C 执行层。
  evidence_probe:
  - 哪个现象支撑你说这里不只是页面显示了输入？
  - 哪个位置支撑你判断这是 Reflected、Stored 还是 DOM 路径？
  conditional_change:
  - 如果同样内容输出到纯文本位置，为什么风险可能消失？
  - 如果只做输入过滤、不做输出编码和执行限制，风险会怎样残留？
served_tasks:
- 浏览器解析与输出上下文基础说明
- Reflected XSS Low 现象记录
- Stored XSS Low 现象记录
- DOM XSS 与类型差异分析
- Low/Medium 对照与 XSS 防护清单
required_relation_graph:
- 至少写出“输入 / 输出位置 / 浏览器解析 / 是否执行 / 控制点”。
- 至少写出 Reflected、Stored、DOM 三类路径差异。
- 只列类型名词和防护名词不算达标。
ai_review_prompt:
- 不能只复制脚本样例或防护清单，要写“自己核实了哪个上下文判断”。
- 第四章最容易误判的是：把输入内容本身写成根因，把现象直接写成完整机制结论。
formative_assessment:
  action: 给学生一组 Reflected / Stored / DOM 现象样例，要求判断它属于哪一类路径，写出最小风险链，并标出一条防护措施主要控制的是输入、输出还是执行。
  pass_criteria:
  - 至少能正确区分 3 类路径中的 2 类。
  - 能说明 XSS 根因不在“字符危险”，而在上下文失控。
  - 不把过滤几个输入直接写成最核心防护。
  common_failures:
  - 把 XSS 写成“脚本标签问题”。
  - 把 Reflected、Stored、DOM 差异写成“样例不同”而不是“路径不同”。
  - 把输出编码、输入校验、CSP 写成同一层措施。
high_freq_misconceptions:
- issue: 任务部分完成
  trigger: 只交现象截图不写机制
  correction: 追问“浏览器在哪一步把它当成了什么”。
  from_memory: true
- issue: 证据不清晰
  trigger: 三类路径比较
  correction: 强制补“哪个位置支持你的判断”。
  from_memory: true
- issue: 证据与结论不对应
  trigger: 根因与防护表述
  correction: 改写为“支持到哪一步就写到哪一步”。
  from_memory: true
- issue: 关系链不足
  trigger: 风险链/关系图收口
  correction: 强制补“输出位置”和“控制点”节点。
  from_memory: true
- issue: 边界表达不足
  trigger: 开场边界判断
  correction: 明确“DVWA 以外不验证”。
  from_memory: true
step9_min_observations:
- 学生最容易把哪个表面现象误写成根因。
- 哪个控制层次最容易被学生混在一起。
- 强制选择题里最常见的错误选项是什么。
after_class_bridge:
  assignment:
  - 按 assignment pack 完成五类任务与收口项。
  - 风险链/关系图必须体现路径差异、控制点和结论范围。
  - AI 审核记录为必填。
  next_chapter:
  - 第四章结束后，第五章进入“上传不是单个动作，而是一条处理链”的文件上传主线。
  if_unbalanced_adjustment:
  - 如果学生仍在背样例，下一次应压缩样例数量、增加输出上下文判断练习。
  - 如果学生不会区分输入、输出、执行三层控制点，下一次应增加防护链分类训练。
