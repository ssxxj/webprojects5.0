assignment:
  submission_format: PDF
  suggested_duration: 3-4 小时
  naming: <学号><姓名>SQL注入漏洞与防护.pdf
lesson:
  duration_minutes: 90
  chapter_type: 漏洞机制章
  core_spine: 从输入影响查询结构走到结果差异，再走到结构分离防护。
  chapter_goals:
  - 学生能理解 SQL 注入的根因是结构被污染，而不是字符本身危险。
  - 学生能区分“正常查询结果变化”和“查询逻辑被改变”。
  - 学生能把普通 SQL 注入、Blind SQL Injection、Low/Medium 差异放回同一条因果链。
  prerequisites:
  - 已完成第一章请求、响应、状态维持的最小理解。
  - 已完成第二章“线索、证据、主动探测”基本区分。
  - 能接受“页面现象背后存在后端处理与数据库查询”这一系统模型。
  boundary_rules:
  - 仅限 DVWA、本机浏览器、localhost、127.0.0.1 或教师明确授权环境。
  - 不使用任何公网真实目标进行 SQL 注入实验或验证。
  - 截图、参数、账号和实验记录必须脱敏、可追溯。
  class_baseline: 已完成第一章系统链路、第二章线索/证据/主动探测区分，但尚未形成稳定的“结构污染”理解。
  environment: DVWA、本机浏览器、教师授权实验环境
  authorized_scope:
  - DVWA
  - 本机浏览器
  - localhost
  - 127.0.0.1
  - 教师授权环境
  sensitive_fields_to_mask:
  - 参数
  - 账号
  - 路径
  - 截图中的实验记录
  pace_blocks:
  - time: 0-10
    name: 开场与边界
    goal: 重申本章不是 payload 记忆课
    teacher_action: 明确授权边界与本章主线。
    student_action: 判断“字符问题 vs 结构问题”。
    evidence: 边界说明
  - time: 10-30
    name: Concept
    goal: 建立数据库查询与输入条件最小模型
    teacher_action: 用“输入 ID 查用户信息”说明查询条件。
    student_action: 判断页面输入为什么会和数据库有关。
    evidence: 任务1 草稿
  - time: 30-55
    name: Mechanism
    goal: 讲清 Low 现象、结构污染和结果差异
    teacher_action: 对比普通输入与异常输入现象。
    student_action: 说明哪里不像正常查询变化。
    evidence: 任务2、任务3 字段
  - time: 55-80
    name: Application
    goal: 收束 Blind / Low-Medium / 防护链
    teacher_action: 解释盲注证据形式、过滤与参数化差异。
    student_action: 完成因果链与防护层次标注。
    evidence: 任务3、任务4 草稿
  - time: 80-90
    name: 形成性评估与收口
    goal: 固化因果链和防护关系图要求
    teacher_action: 现场收束关系图列项与 AI 审核要求。
    student_action: 完成最小因果链表和 1 个强制判断题。
    evidence: 关系图草稿 + Exit Ticket
  omdm_map:
    observation:
      action: 展示普通输入与异常输入下的结果差异。
      question: 这里看起来只是查不同值，还是查询逻辑被改变了？
      evidence: 学生能描述差异。
    decision:
      action: 强制判断“字符问题 / 结构问题”。
      question: SQL 注入核心更接近字符危险，还是结构被污染？
      evidence: 口头选择与理由。
    evidence:
      action: 标出输入、查询条件、结果差异和行为证据。
      question: 哪个差异支撑你说它不像正常查询？
      evidence: 输入点、结果差异、真假提示。
    mechanism:
      action: 收束“输入 -> 拼接 -> 解析 -> 执行 -> 结果差异”。
      question: 为什么 payload 不是根因，结构污染才是根因？
      evidence: 因果链解释。
    modification:
      action: 讨论 Blind、Medium、参数化后的变化。
      question: 如果没有直接回显，为什么仍可能有证据？如果改成参数化，链在哪被截断？
      evidence: 条件变化解释。
  board_skeleton:
  - 输入 -> 查询构造 -> 数据库解释 -> 结果差异
  - 结构污染
  - 根因 / 暴露面 / 后果范围
  key_questions:
    forced_choice:
    - SQL 注入的根因更接近：A 输入里有几个危险字符；B 输入进入了不该进入的查询结构。
    - Blind SQL Injection 和普通 SQL 注入的最大差异更接近：A 根因不同；B 证据形式不同。
    - 参数化查询主要控制的是：A 暴露面；B 根因；C 后果范围。
    evidence_probe:
    - 哪个结果差异支撑你说这里不像正常查询变化？
    - 哪个现象支撑你说“即使没有直接回显，系统仍然泄露了信息”？
    conditional_change:
    - 如果把同样输入放到参数化查询里，这条链会在哪一步被打断？
    - 如果只隐藏错误信息、不解决根因，风险会怎样变化？
  served_tasks:
  - 数据库与查询条件基础说明
  - DVWA SQL Injection Low 现象记录
  - 机制分析与差异比较
  - SQL注入防护清单与解释
  required_relation_graph:
  - 至少写出“输入 / 查询构造 / 数据库解释 / 结果差异 / 防护控制点”。
  - 至少写出 Blind 与普通注入共享同一根因、但证据形式不同。
  - 只列漏洞名词和防护名词不算达标。
  ai_review_prompt:
  - 不能只复制 payload 或防护清单，要写“自己核实了哪个根因判断”。
  - 第三章最容易误判的是：把字符写成根因、把无回显写成“没有信息”。
  formative_assessment:
    action: 给学生一组普通输入/异常输入/盲注行为差异样例，要求判断哪些属于普通查询变化、哪些更像结构被改变，写出一条最小因果链，并标出一条防护措施控制的是根因、暴露面还是后果范围。
    pass_criteria:
    - 至少能正确指出 1 处“结构污染”判断依据。
    - 能说出 Blind 与普通注入共享同一根因。
    - 不把过滤某些字符直接写成最核心防护。
    common_failures:
    - 把 payload 或特殊字符本身写成根因。
    - 把“有回显 / 无回显”写成根因差异。
    - 把错误处理、参数化查询和最小权限写成同一层措施。
  high_freq_misconceptions:
  - issue: 任务部分完成
    trigger: 只交截图不写机制
    correction: 追问“这组差异说明了哪一步被影响”。
    from_memory: true
  - issue: 证据不清晰
    trigger: 普通注入与盲注比较
    correction: 强制补“哪个现象支持你”。
    from_memory: true
  - issue: 证据与结论不对应
    trigger: 根因与防护表述
    correction: 改写为“支持到哪一步就写到哪一步”。
    from_memory: true
  - issue: 关系链不足
    trigger: 因果链/关系图收口
    correction: 强制补“数据库解释”和“控制点”节点。
    from_memory: true
  - issue: 边界表达不足
    trigger: 开场边界判断
    correction: 明确“DVWA 以外不验证”。
    from_memory: true
  step9_min_observations:
  - 学生最容易把哪个表面现象误写成根因。
  - 哪个防护层次最容易被学生混在一起。
  - 强制选择题里最常见的错误选项是什么。
  after_class_bridge:
    assignment:
    - 按 assignment pack 完成四类任务与收口项。
    - 因果链/防护关系图必须体现根因、防护层次和结论范围。
    - AI 审核记录为必填。
    next_chapter:
    - 第三章结束后，第四章进入“输入不是影响查询结构，而是输出进入浏览器解释执行环境”的 XSS 主线。
    if_unbalanced_adjustment:
    - 如果学生仍在背 payload，下一次应压缩样例数量、增加结构污染判断练习。
    - 如果学生不会区分根因、暴露面、后果范围，下一次应增加防护链分类训练。
