  - 是否避免把 payload 或特殊字符本身写成根因
  - 是否说明盲注与普通 SQL 注入共享同一根因，只是证据形式不同
  - 是否区分过滤、参数化查询、错误处理和最小权限的控制层次
  - 是否对授权边界、复现实验和风险表达给出负责任说明
