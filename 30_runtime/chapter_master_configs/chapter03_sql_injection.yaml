owner: Shen
updated: '2026-04-20'
profile:
  chapter_mainline: 从输入影响查询，到结构分离防护
  capability_goals:
  - 解释 SQL 注入的形成条件与根因
  - 在 DVWA 中观察和复现基础 SQL 注入现象
  - 区分普通 SQL 注入与盲注在证据层的差异
  - 比较 Low 与 Medium 在控制思路上的差异
  - 从参数化查询、错误处理和最小权限角度解释防护链条
  tasks:
  - name: 数据库与查询条件基础说明
    score: 3.0
    required: true
    semantic_requirements:
    - 输入条件—数据库查询—返回结果
    - 为什么页面功能与数据库有关
    - 输入如何进入查询条件
  - name: DVWA SQL Injection Low 现象记录
    score: 4.0
    required: true
    semantic_requirements:
    - 实验目标或页面
    - 普通输入与异常输入对比
    - 返回差异
    - 为什么不像正常查询变化
  - name: 机制分析与差异比较
    score: 4.5
    required: true
    semantic_requirements:
    - 输入—拼接—解析—执行—回显或行为差异链条
    - Low与Medium差异
    - 普通SQL注入与盲注差异
    - 根因是结构被污染而不是字符本身
  - name: SQL注入防护清单与解释
    score: 3.5
    required: true
    semantic_requirements:
    - 参数化查询
    - 输入校验
    - 错误处理
    - 最小权限
    - 各措施控制的是根因、暴露面还是后果范围
  relation_item_name: SQL注入因果链/防护关系图
  relation_item_score: 3.0
  self_eval_score: 2.0
