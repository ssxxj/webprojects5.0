schema_version: v5.0
generator_target: chapter_asset_master
course: Web应用安全与防护
chapter_id: chapter06_command_injection
chapter_title: 第六章 命令执行漏洞与防护
owner: Shen
updated: '2026-04-20'
profile:
  chapter_mainline: 从应用层输入进入系统执行环境，到跨层边界控制
  capability_goals:
  - 解释命令执行漏洞的基本形成机制与跨层风险
  - 在 DVWA 中观察 Command Injection Low 的基础现象
  - 比较 Low 与 Medium 的控制差异，并说明简单黑名单为什么不够
  - 把命令执行与 SQL 注入放在“输入进入执行结构”这一共同框架中理解
  - 用“输入—拼接/传递—系统执行—结果返回”的链条解释风险与防护
  tasks:
  - name: 应用层到系统层执行链说明
    score: 3.0
    required: true
    semantic_requirements:
    - 应用层与系统层角色
    - 输入如何进入系统调用链
    - 为什么属于跨层风险
    - 至少1个业务场景
  - name: DVWA Command Injection Low 现象记录
    score: 4.0
    required: true
    semantic_requirements:
    - 实验页面或目标
    - 输入与结果差异
    - 系统执行迹象
    - 为什么不只是页面回显变化
  - name: Low/Medium 控制差异与命令结构分析
    score: 4.0
    required: true
    semantic_requirements:
    - Low 与 Medium 至少2项差异
    - 说明这些差异控制了输入表面、执行结构还是后果范围
    - 为什么禁止几个符号通常不够
    - 与 SQL 注入的至少1个共性
  - name: 改进方案与防护清单
    score: 4.0
    required: true
    semantic_requirements:
    - 参数分离或替代安全接口
    - 最小权限或最小化暴露面
    - 结果处理或边界限制
    - 至少4条改进建议并说明对应控制点
  relation_item_name: 应用层到系统层风险链路图/防护关系图
  relation_item_score: 3.0
  self_eval_score: 2.0
  redlines:
  - name: 未脱敏
    description: 截图、命令输出、账号、路径或其他敏感信息未按要求脱敏
    action: lt_60
  - name: 超出授权边界
    description: 对未授权真实目标进行命令执行测试或其他验证
    action: lt_60
  - name: 证据伪造或不可追溯
    description: 现象截图、结果说明或实验过程明显不一致
    action: lt_60
  - name: 高度雷同或抄袭代做
    description: 与他人作业高度雷同，或存在抄袭、代做情形
    action: lt_60
  professional_checks:
  - 是否说明命令执行的关键在于输入进入命令结构，而不是记住某条命令
  - 是否区分应用层行为变化与系统层执行变化
  - 是否说明黑名单限制、参数分离、替代接口和最小权限的控制层次
  - 是否把命令执行与 SQL 注入放回“数据进入执行结构”的共同框架
  - 是否对跨层风险、授权边界和后果范围给出负责任表达
  default_tags:
  - T1
  - T2
  - E1
  - E2
  - M1
  - R1
  - R2
  - B1
  - P1
  - C1
assignment:
  submission_format: PDF
  suggested_duration: 3-4 小时
  naming: <学号><姓名>命令执行漏洞与防护.pdf
lesson:
  duration_minutes: 90
  chapter_type: 漏洞机制章
  core_spine: 从应用层输入进入系统执行环境，到跨层边界控制与后果范围收束。
  chapter_goals:
  - 学生能理解命令执行漏洞的关键不是命令样例，而是输入进入了系统执行结构。
  - 学生能区分应用层现象变化与系统层执行变化。
  - 学生能把 Low / Medium 差异放回“输入限制、参数分离、替代接口、最小权限”这一控制链。
  prerequisites:
  - 已完成第三章“数据进入查询结构”主线。
  - 已完成第五章“上传进入处理链”主线。
  - 能接受风险会从应用层放大到系统层。
  boundary_rules:
  - 仅限 DVWA、本机浏览器、localhost、127.0.0.1 或教师明确授权环境。
  - 不对任何公网真实主机做命令执行观察、验证或对比。
  - 截图中的主机信息、路径、账号等敏感内容必须脱敏、可追溯。
  class_baseline: 已完成前五章，能接受“输入进入危险环境”这一主线，但容易把命令执行理解成命令样例和黑名单绕过技巧。
  environment: DVWA、本机浏览器、教师授权实验环境
  authorized_scope:
  - DVWA
  - 本机浏览器
  - localhost
  - 127.0.0.1
  - 教师授权环境
  sensitive_fields_to_mask:
  - 主机信息
  - 路径
  - 账号
  - 截图中的实验记录
  pace_blocks:
  - time: 0-10
    name: 开场与边界
    goal: 纠正“这是命令课”的直觉
    teacher_action: 明确跨层边界与本章主线。
    student_action: 判断风险跨过了哪条边界。
    evidence: 边界说明
  - time: 10-30
    name: Concept
    goal: 建立“输入 -> 拼接/传递 -> 系统执行 -> 结果返回”模型
    teacher_action: 用简化场景拆应用层与系统层。
    student_action: 说出输入如何走到执行环境。
    evidence: 任务1 草稿
  - time: 30-55
    name: Mechanism
    goal: 讲清 Command Injection Low 的结构失控点
    teacher_action: 展示 Low 现象与结果差异。
    student_action: 标出输入怎样影响执行结构。
    evidence: 任务2 字段
  - time: 55-75
    name: Application
    goal: 收束 Low / Medium 差异与结构性防护
    teacher_action: 对比表面黑名单与真正控制层次。
    student_action: 完成 Low/Medium 对照表。
    evidence: 任务3-4 草稿
  - time: 75-90
    name: 形成性评估与收口
    goal: 固化跨层风险链与防护关系图要求
    teacher_action: 现场收束关系图列项与 AI 审核要求。
    student_action: 完成最小关系链图和 1 个强制判断题。
    evidence: 关系图草稿 + Exit Ticket
  omdm_map:
    observation:
      action: 展示输入、系统返回差异与执行迹象。
      question: 这里变化的是页面显示，还是系统执行行为？
      evidence: 学生能指出执行层迹象。
    decision:
      action: 强制判断“应用层问题 / 系统层风险放大”。
      question: 输入是作为普通值传递，还是进入了命令整体结构？
      evidence: 口头选择与理由。
    evidence:
      action: 标出输入点、调用位置、结果差异与后果范围。
      question: 哪个现象支撑你说这里已经跨到系统层？
      evidence: 输入点、结果差异、执行线索。
    mechanism:
      action: 收束“输入 -> 调用方式 -> 系统执行 -> 结果返回”链。
      question: 为什么拦几个符号不等于真正防护？
      evidence: 风险链解释。
    modification:
      action: 讨论参数分离、替代接口、最小权限时的变化。
      question: 如果输入只能作为受限参数值传递，风险链在哪一步被切断？
      evidence: 条件变化解释。
  board_skeleton:
  - 输入 -> 调用方式 -> 系统执行 -> 结果返回 -> 后果范围
  - 调用方式：直接拼接 / 受限参数 / 替代接口
  - 输入限制 -> 参数分离 -> 替代接口 -> 最小权限 -> 结果处理
  key_questions:
    forced_choice:
    - 命令执行漏洞更接近：A 会很多命令才危险；B 不可信输入进入了系统执行结构。
    - 黑名单过滤几个符号更接近：A 完整防护；B 表面限制。
    - 替代接口和最小权限更接近控制：A 表示层；B 执行结构与后果范围。
    evidence_probe:
    - 哪个现象支撑你说这里不只是页面回显变化？
    - 哪个位置支撑你判断输入已经进入命令整体执行结构？
    conditional_change:
    - 如果应用改用安全接口而不直接拼接系统命令，风险链会怎样变化？
    - 如果系统权限被压缩，即使结构仍有问题，后果范围会怎样变化？
  served_tasks:
  - 应用层到系统层执行链说明
  - DVWA Command Injection Low 现象记录
  - Low / Medium 控制差异与命令结构分析
  - 改进方案与防护清单
  required_relation_graph:
  - 至少写出“输入 / 调用方式 / 系统执行 / 结果返回 / 控制点”。
  - 至少写出一个“能说明什么”和一个“不能直接替代什么”。
  - 只列命令样例、防护名词或工具名不算达标。
  ai_review_prompt:
  - 不能只复制绕过样例或命令清单，要写清自己核实了哪个结构失控点。
  - 第六章最容易误判的是：把返回结果变化直接写成完整漏洞机制结论。
  formative_assessment:
    action: 给学生一组 Command Injection Low / Medium 现象，要求画出最小风险链，指出失控点和控制点，并判断当前证据最多支撑到“页面变化
      / 系统执行变化 / 后果范围扩大”的哪一步。
    pass_criteria:
    - 至少能正确写出“输入 -> 拼接/传递 -> 系统执行 -> 结果返回”四段链路。
    - 能说明命令执行为什么是跨层风险。
    - 不把简单黑名单直接写成结构性防护。
    common_failures:
    - 把命令执行写成“命令知识点”。
    - 只讨论符号和样例，不讨论应用层到系统层的边界。
    - 把执行结果直接写成完整机制结论。
  high_freq_misconceptions:
  - issue: 任务部分完成
    trigger: 只交现象不交链路
    correction: 追问“输入如何走到系统执行环境”。
    from_memory: true
  - issue: 证据不清晰
    trigger: Low / Medium 对比
    correction: 强制补“哪个现象支持跨层判断”。
    from_memory: true
  - issue: 证据与结论不对应
    trigger: 直接写执行漏洞已完全成立
    correction: 改写为“当前证据最多支撑到哪一步”。
    from_memory: true
  - issue: 关系链不足
    trigger: 风险链/关系图收口
    correction: 强制补“调用方式”和“控制层次”节点。
    from_memory: true
  - issue: 防护建议泛化
    trigger: 改进方案设计
    correction: 强制把建议挂回参数分离、替代接口、最小权限。
    from_memory: true
  step9_min_observations:
  - 学生最容易把哪个现象误写成完整机制结论。
  - 哪个控制层次最容易被学生忽略。
  - 强制选择题里最常见的错误选项是什么。
  after_class_bridge:
    assignment:
    - 按 assignment pack 完成四类任务与收口项。
    - 风险链/关系图必须体现跨层边界、控制点和结论范围。
    - AI 审核记录为必填。
    next_chapter:
    - 第六章结束后，第七章进入“系统为什么信任你、为什么继续信任你、为什么最终放行”的身份信任链主线。
    if_unbalanced_adjustment:
    - 如果学生仍在背命令样例，下次应压缩样例数量、增加边界与链路拆分训练。
    - 如果学生不会区分表面限制与结构性防护，下次应强化控制层次归类练习。
