schema_version: v5.0
generator_target: chapter_asset_master
course: Web应用安全与防护
chapter_id: chapter99_demo
chapter_title: 第九十九章 Demo章节
owner: Test
updated: 2026-04-20

profile:
  chapter_mainline: 从输入现象到结构判断，再到最小防护表达
  capability_goals:
    - 能识别最小现象与证据对象
    - 能把任务写成关系链而不是截图堆叠
    - 能对边界和风险给出负责任表达
  tasks:
    - name: Demo任务一
      score: 2.5
      required: true
      semantic_requirements:
        - 现象
        - 参数
        - 说明
    - name: Demo任务二
      score: 2.5
      required: true
      semantic_requirements:
        - 输入
        - 输出
        - 结论边界
  relation_item_name: Demo综合关系图/表
  relation_item_score: 3.0
  self_eval_score: 2.0
  redlines:
    - name: 未脱敏
      description: 出现敏感字段且未脱敏
      action: lt_60
    - name: 超出授权边界
      description: 对未授权真实目标做测试
      action: lt_60
  professional_checks:
    - 是否区分线索与证据
    - 是否说明结论边界
  default_tags:
    - T1
    - E1
    - R1

assignment:
  submission_format: PDF
  suggested_duration: 3-4 小时
  naming: <学号><姓名>Demo章节.pdf

lesson:
  duration_minutes: 90
  chapter_type: Demo机制章
  core_spine: 先看现象，再问证据，最后收束边界。
  chapter_goals:
    - 学生能描述最小现象与输入输出变化
    - 学生能指出至少一个字段支撑判断
    - 学生能写出不能直接下的结论
  prerequisites:
    - 已理解最小请求响应对象
  boundary_rules:
    - 仅限教师授权环境
    - 不对公网真实目标做验证
    - 截图中的敏感字段必须脱敏、可追溯
  class_baseline: 已完成最小请求响应入门
  environment: 教师授权实验环境
  authorized_scope:
    - 教师授权环境
    - localhost
  sensitive_fields_to_mask:
    - Cookie
    - Token
  pace_blocks:
    - time: 0-10
      name: 开场
      goal: 建立主线
      teacher_action: 说明本节只做最小判断链
      student_action: 回答哪些内容算现象
      evidence: 口头分类
    - time: 10-30
      name: Concept
      goal: 建立对象
      teacher_action: 展示输入输出样例
      student_action: 标注变化点
      evidence: 字段标注
    - time: 30-55
      name: Mechanism
      goal: 收束机制
      teacher_action: 说明为什么不能直接下大结论
      student_action: 回答证据能支撑到哪一步
      evidence: 口头解释
    - time: 55-80
      name: Application
      goal: 连接作业
      teacher_action: 演示如何写关系图
      student_action: 写出下一步
      evidence: 关系图草稿
    - time: 80-90
      name: 收口
      goal: 形成性评估
      teacher_action: 给出判断题
      student_action: 完成 exit ticket
      evidence: exit ticket
  omdm_map:
    observation:
      action: 展示样例
      question: 你看到了什么变化
      evidence: 现象描述
    decision:
      action: 强制判断
      question: 这是线索还是证据
      evidence: 选择与理由
    evidence:
      action: 标出字段
      question: 哪个字段支持你的判断
      evidence: 字段标注
    mechanism:
      action: 收束边界
      question: 为什么不能直接写成漏洞成立
      evidence: 边界表达
    modification:
      action: 讨论条件变化
      question: 如果控制点变化会怎样
      evidence: 条件变化说明
  board_skeleton:
    - 现象
    - 证据
    - 边界
  key_questions:
    forced_choice:
      - 这是线索还是证据
    evidence_probe:
      - 哪个字段支持你的判断
    conditional_change:
      - 如果少了这个字段还能不能下同样结论
  served_tasks:
    - Demo任务一
    - Demo任务二
  required_relation_graph:
    - 必须写出关系链
    - 不能只列概念
  ai_review_prompt:
    - 写清保留了什么
    - 写清删改了什么
  formative_assessment:
    action: 给一组样例让学生判断证据边界
    pass_criteria:
      - 能区分现象与证据
      - 不直接下过度结论
    common_failures:
      - 截图很多但没有字段
      - 结论超过证据范围
  high_freq_misconceptions:
    - issue: 只贴图不解释
      trigger: 作业收口
      correction: 强制写字段与边界
      from_memory: true
  step9_min_observations:
    - 学生最常混淆什么
    - 哪个字段最常漏写
    - 哪类结论最容易过度
  after_class_bridge:
    assignment:
      - 完成两项任务
      - 完成关系图与 AI 审核记录
    next_chapter:
      - 下节进入更复杂的结构分析
    if_unbalanced_adjustment:
      - 增加字段追问训练
